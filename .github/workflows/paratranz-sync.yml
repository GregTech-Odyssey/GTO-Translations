name: Sync Paratranz Translations

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Sync Paratranz files
        env:
          PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
        run: |
          if [ -z "$PARATRANZ_TOKEN" ]; then
            echo "PARATRANZ_TOKEN is not configured."
            exit 1
          fi

          python scripts/sync_paratranz_to_mc.py

      - name: Emit release warnings
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path(".paratranz-sync/manifest.json").read_text(encoding="utf-8"))
          for warning in manifest.get("release_line_warnings", []):
            print(f"::warning::{warning}")
          PY

      - name: Resolve configured locale paths
        id: locale_paths
        run: |
          python - <<'PY'
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path("scripts").resolve()))
          import project_config

          config = project_config.load_project_config()
          locales = project_config.get_configured_locales(config)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            print(f"locale_paths={' '.join(locales)}", file=fh)
          PY

      - name: Detect translation changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain --untracked-files=all -- .paratranz-sync.yml ${{ steps.locale_paths.outputs.locale_paths }})" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release metadata
        id: release_meta
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          python - <<'PY'
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path("scripts").resolve()))
          import project_config

          config = project_config.load_project_config()
          current_version = project_config.get_current_version(config)
          if current_version is None:
            raise RuntimeError("current_version was not written to .paratranz-sync.yml")
          release_line = project_config.build_release_line(
            project_config.get_release_product(config),
            current_version,
          )

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as fh:
            print(f"release_line={release_line}", file=fh)
          PY

      - name: Commit translation changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .paratranz-sync.yml
          git add ${{ steps.locale_paths.outputs.locale_paths }}
          git commit -m "chore: sync Paratranz translations"

      - name: Compute artifact version
        id: version
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          short_sha="$(git rev-parse --short=8 HEAD)"
          build_date="$(date -u +"%y.%m.%d")"
          built_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          artifact_version="${{ steps.release_meta.outputs.release_line }}-dev-${build_date}.${GITHUB_RUN_NUMBER}-${short_sha}"
          echo "artifact_version=${artifact_version}" >> "$GITHUB_OUTPUT"
          echo "source_revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "built_at=${built_at}" >> "$GITHUB_OUTPUT"

      - name: Build resource-pack artifacts
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          python scripts/build_resourcepack_artifacts.py \
            --artifact-version "${{ steps.version.outputs.artifact_version }}" \
            --release-line "${{ steps.release_meta.outputs.release_line }}" \
            --source-revision "${{ steps.version.outputs.source_revision }}" \
            --built-at "${{ steps.version.outputs.built_at }}"

      - name: Upload en_us artifact
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: en_us-${{ steps.version.outputs.artifact_version }}
          path: dist/artifacts/en_us/resourcepacks
          if-no-files-found: error

      - name: Upload ru_ru artifact
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ru_ru-${{ steps.version.outputs.artifact_version }}
          path: dist/artifacts/ru_ru/resourcepacks
          if-no-files-found: error

      - name: Upload ja_jp artifact
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ja_jp-${{ steps.version.outputs.artifact_version }}
          path: dist/artifacts/ja_jp/resourcepacks
          if-no-files-found: error

      - name: Upload combined artifact
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: all-locales-${{ steps.version.outputs.artifact_version }}
          path: dist/artifacts/all-locales/resourcepacks
          if-no-files-found: error

      - name: Push translation commit
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push
