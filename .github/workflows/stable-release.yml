name: Publish Stable Release

on:
  push:
    tags:
      - "gto-*-r*"

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Compute release metadata
        id: release
        run: |
          tag_name="${GITHUB_REF_NAME}"
          release_line="${tag_name%-r*}"
          release_title="GTO-Translation ${tag_name}"
          built_at="$(date +"%Y-%m-%dT%H:%M:%S%:z")"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "release_line=${release_line}" >> "$GITHUB_OUTPUT"
          echo "release_title=${release_title}" >> "$GITHUB_OUTPUT"
          echo "source_revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "built_at=${built_at}" >> "$GITHUB_OUTPUT"

      - name: Build resource-pack artifacts
        run: |
          python scripts/build_resourcepack_artifacts.py \
            --artifact-version "${{ steps.release.outputs.tag_name }}" \
            --release-line "${{ steps.release.outputs.release_line }}" \
            --source-revision "${{ steps.release.outputs.source_revision }}" \
            --built-at "${{ steps.release.outputs.built_at }}"

      - name: Package release assets
        run: |
          mkdir -p dist/release
          cd dist/artifacts/en_us
          zip -r "../../release/gto-lang-en_us-${{ steps.release.outputs.tag_name }}.zip" gto-lang-en_us-${{ steps.release.outputs.tag_name }}
          cd ../ru_ru
          zip -r "../../release/gto-lang-ru_ru-${{ steps.release.outputs.tag_name }}.zip" gto-lang-ru_ru-${{ steps.release.outputs.tag_name }}
          cd ../ja_jp
          zip -r "../../release/gto-lang-ja_jp-${{ steps.release.outputs.tag_name }}.zip" gto-lang-ja_jp-${{ steps.release.outputs.tag_name }}
          cd ../all-locales
          zip -r "../../release/gto-lang-all-locales-${{ steps.release.outputs.tag_name }}.zip" gto-lang-all-locales-${{ steps.release.outputs.tag_name }}

      - name: Write release notes
        run: |
          cat <<'EOF' > dist/release/RELEASE_NOTES.md
          Stable translation release promoted manually from the sync pipeline.

          - Release line: ${{ steps.release.outputs.release_line }}
          - Artifact version: ${{ steps.release.outputs.tag_name }}
          - Source revision: ${{ steps.release.outputs.source_revision }}
          - Built at: ${{ steps.release.outputs.built_at }}
          EOF

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.release.outputs.tag_name }}" > /dev/null 2>&1; then
            gh release edit "${{ steps.release.outputs.tag_name }}" \
              --title "${{ steps.release.outputs.release_title }}" \
              --notes-file dist/release/RELEASE_NOTES.md
            gh release upload "${{ steps.release.outputs.tag_name }}" dist/release/*.zip --clobber
          else
            gh release create "${{ steps.release.outputs.tag_name }}" dist/release/*.zip \
              --title "${{ steps.release.outputs.release_title }}" \
              --notes-file dist/release/RELEASE_NOTES.md
          fi
